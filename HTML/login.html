<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login Page</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom Yellow Links -->
    <style>
      .link-yellow {
        color: #ffc107;
        text-decoration: none;
      }

      .link-yellow:hover {
        color: #e0a800;
        text-decoration: underline;
      }
    </style>
  </head>

  <body class="bg-light d-flex align-items-center justify-content-center vh-100">

    <div class="card shadow-lg p-4 border-0 rounded-4" style="max-width: 400px; width: 100%;">

      <!-- Logo -->
      <div class="text-center mb-3">
        <img src="Assets/logo.png" alt="ParkVille Logo" style="width: 80px;">
        <h4 class="mt-2 fw-bold">ParkVille</h4>
      </div>

      <!-- Heading -->
      <div class="text-center mb-3">
        <h5 class="fw-bold">Welcome back</h5>
        <p class="text-muted small">Please enter your details to sign in</p>
      </div>

      <!-- Form -->
      <form>

        <!-- Username -->
        <div class="mb-3">
          <label class="form-label">Username</label>
          <input type="text" class="form-control" placeholder="Enter your username">
        </div>

        <!-- Password -->
        <div class="mb-2">
          <label class="form-label">Password</label>
          <div class="d-flex align-items-center">
            <input type="password" class="form-control" placeholder="Enter your password">
            <a href="#" class="ms-2 small link-yellow">Forgot?</a>
          </div>
        </div>

        <!-- Remember -->
        <div class="form-check mb-3">
          <input class="form-check-input" type="checkbox" id="remember">
          <label class="form-check-label" for="remember">
            Keep me logged in
          </label>
        </div>

        <!-- Sign In Button -->
        <button type="submit" class="btn btn-warning w-100 fw-semibold">
          Sign In →
        </button>

      </form>

      <!-- Divider -->
      <div class="text-center my-3 text-muted small">
        OR CONTINUE WITH
      </div>

      <!-- Social Buttons -->
      <div class="d-flex gap-2 mb-3">
        <button class="btn btn-outline-dark w-50">Google</button>
        <button class="btn btn-outline-dark w-50">iOS</button>
      </div>

      <!-- Signup -->
      <div class="text-center small mb-3">
        Don't have an account?
        <a href="#" class="link-yellow">Create account</a>
      </div>

      <!-- Footer -->
      <div class="text-center small">
        <a href="#" class="link-yellow me-2">Help Center</a>
        <a href="#" class="link-yellow me-2">Terms</a>
        <a href="#" class="link-yellow">Privacy</a>
      </div>

    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  </body>
</html>
